<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thorn Management Trust | Employee Portal</title>
<style>body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f3f6fa;color:#1f2937}.header{background:#16324f;color:#fff;padding:18px 30px;display:flex;justify-content:space-between}.logo{font-size:24px;font-weight:bold}.container{display:flex;min-height:calc(100vh - 60px)}.sidebar{width:220px;background:#203a57;color:white;padding:20px}.sidebar ul{list-style:none;padding:0}.sidebar li{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.15)}.main{flex:1;padding:40px}.card{background:white;border-radius:10px;padding:25px;box-shadow:0 2px 8px rgba(0,0,0,.08);max-width:420px}input{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:6px}button{width:100%;padding:12px;background:#0078d4;color:white;border:none;border-radius:6px}.notice{margin-top:15px;font-size:12px;color:#666}.banner{background:#e8f1fb;padding:15px;border-left:4px solid #0078d4;margin-bottom:20px}</style></head>
<body><div class="header"><div class="logo">Thorn Management Trust</div><div>Employee Portal</div></div><div class="container"><div class="sidebar"><h3>Resources</h3><ul><li>HR Services</li><li>Payroll</li><li>Benefits</li><li>Training</li><li>IT Support</li></ul></div><div class="main"><div class="banner">The Employee Portal is currently being updated. Some services may be temporarily unavailable.</div><div class="card"><h2>Employee Sign In</h2><input type="text" placeholder="Employee ID"><input type="password" placeholder="Password"><button type="button">Sign In</button><p class="notice">Portal maintenance and content updates are currently in progress.</p></div></div></div></body></html>
